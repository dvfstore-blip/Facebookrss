name: Update Facebook RSS

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *" # toutes les heures, à H+17, en UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate RSS
        env:
          FEED_TITLE: "ELAN59 - Flux Facebook clubs"
          FEED_DESCRIPTION: "Flux RSS gratuit généré depuis les pages Facebook publiques des clubs."
          SITE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        run: python src/generate_feed.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
